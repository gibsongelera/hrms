services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: hrms-app:latest
    container_name: hrms_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-hrms_db}
      DB_USER: ${MYSQL_USER:-hrms_user}
      DB_PASS: ${MYSQL_PASSWORD:-hrms_pass}
    volumes:
      - ./uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hrms_net

  db:
    image: mysql:8.0
    container_name: hrms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hrms_db}
      MYSQL_USER: ${MYSQL_USER:-hrms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hrms_pass}
    ports:
      - "3307:3306"
    volumes:
      - hrms_db_data:/var/lib/mysql
      - ./sql/database_setup.sql:/docker-entrypoint-initdb.d/01-database_setup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - hrms_net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: hrms_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hrms_net

volumes:
  hrms_db_data:

networks:
  hrms_net:
    driver: bridge
